<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Security Notice</title>
  <link rel="stylesheet" href="styles.css"/>
</head>

<body>
  <div class="container">

    <div class="card warning">

      <div class="icon">🚨</div>

      <h1>Untrusted Installer Detected</h1>

      <p class="subtitle">
        This application installation cannot be verified.
      </p>

      <div class="divider"></div>

      <p class="message">
        For your security, access to this session has been restricted.  
        Please uninstall this version and reinstall the application from an official source.
      </p>

      <div class="meta">
        <span>Event: INSTALLER_VERIFICATION_FAILED</span>
        <span>Code: SEC-UI-01</span>
      </div>

      <a class="button" href="index.html">
        Return
      </a>

    </div>

  </div>
</body>
</html>
