<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Security Notice</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body data-scenario="keyboard">
  <div class="container">

    <div class="card warning">

      <div class="icon">🚨</div>

      <h1 id="title">Security Restriction</h1>

      <p class="subtitle" id="subtitle">
        An input method could not be verified.
      </p>

      <div class="divider"></div>

      <p class="message" id="message">
        Access to this session has been restricted for security reasons.
      </p>

      <div class="meta">
        <span id="event">Event: UNKNOWN</span>
        <span id="code">Code: N/A</span>
      </div>

      <a class="button" href="index.html">
        Return
      </a>

    </div>

  </div>

  <!-- Keyboard-specific logic -->
  <script src="shield.js"></script>
</body>

</html>
